media:
  input: apps/app/public
  output: /

content:
  - name: posts
    label: Blog Posts
    type: collection
    path: apps/app/src/content/blog
    format: frontmatter
    filename: "{fields.slug}.md"
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: publishDate
        label: Publish Date
        type: date
        required: true
      - name: updatedDate
        label: Updated Date
        type: date
      - name: image
        label: Featured Image
        type: image
      - name: tags
        label: Tags
        type: string
        list: true
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
