<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" role="img" aria-label="NASA cost tracking orbital abstract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset=".6" stop-color="#0a0d20"/>
      <stop offset="1" stop-color="#1a1d3a"/>
    </linearGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="70%">
      <stop offset="0" stop-color="rgba(124,92,255,.55)"/>
      <stop offset=".7" stop-color="rgba(56,189,248,.2)"/>
      <stop offset="1" stop-color="rgba(5,6,15,.9)"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".2"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 56V0h56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="875" fill="url(#bg)"/>
  <rect width="1400" height="875" fill="url(#grid)"/>
  <rect width="1400" height="875" fill="url(#glow)"/>

  <!-- Starfield -->
  <g fill="#ffffff">
    <circle cx="110" cy="120" r="1.5" opacity=".7"/>
    <circle cx="260" cy="80"  r="1" opacity=".5"/>
    <circle cx="380" cy="160" r="1.3" opacity=".6"/>
    <circle cx="540" cy="60"  r="1.2" opacity=".7"/>
    <circle cx="760" cy="110" r="1" opacity=".5"/>
    <circle cx="880" cy="40"  r="1.5" opacity=".8"/>
    <circle cx="1020" cy="150" r="1.2" opacity=".5"/>
    <circle cx="1200" cy="90" r="1" opacity=".6"/>
    <circle cx="1310" cy="190" r="1.3" opacity=".7"/>
    <circle cx="150" cy="780" r="1" opacity=".5"/>
    <circle cx="340" cy="820" r="1.3" opacity=".7"/>
    <circle cx="620" cy="780" r="1.2" opacity=".6"/>
    <circle cx="900" cy="820" r="1" opacity=".5"/>
    <circle cx="1120" cy="790" r="1.4" opacity=".7"/>
    <circle cx="1260" cy="820" r="1.1" opacity=".5"/>
  </g>

  <!-- Planet with concentric orbits -->
  <g transform="translate(700 437)">
    <ellipse cx="0" cy="0" rx="360" ry="130" fill="none" stroke="rgba(56,189,248,.25)" stroke-dasharray="2 6"/>
    <ellipse cx="0" cy="0" rx="280" ry="100" fill="none" stroke="rgba(124,92,255,.35)" stroke-dasharray="3 6" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="460" ry="160" fill="none" stroke="rgba(56,189,248,.18)" stroke-dasharray="2 10" transform="rotate(12)"/>

    <circle cx="0" cy="0" r="140" fill="url(#planet)"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="rgba(56,189,248,.35)"/>
    <!-- Planet surface bands -->
    <path d="M -130 -30 C -80 -40, 60 -20, 130 -40" fill="none" stroke="rgba(255,255,255,.15)"/>
    <path d="M -132 10  C -70   0,  40  20, 132  8"  fill="none" stroke="rgba(255,255,255,.12)"/>
    <path d="M -126 50  C -60  40,  30  60, 130 52"  fill="none" stroke="rgba(255,255,255,.1)"/>

    <!-- Satellites on orbits -->
    <g>
      <circle cx="340" cy="-40" r="6" fill="#38bdf8"/>
      <circle cx="340" cy="-40" r="14" fill="none" stroke="rgba(56,189,248,.45)"/>
    </g>
    <g transform="rotate(-15)">
      <circle cx="-260" cy="30" r="5" fill="#7c5cff"/>
      <circle cx="-260" cy="30" r="12" fill="none" stroke="rgba(124,92,255,.5)"/>
    </g>
    <g transform="rotate(12)">
      <circle cx="440" cy="60" r="4" fill="#22d3ee"/>
    </g>
  </g>

  <!-- Mission-control data ticker top-left -->
  <g transform="translate(120 130)" font-family="ui-monospace, monospace" font-size="13" fill="rgba(56,189,248,.7)">
    <text>MISSION://COST-TRACKER</text>
    <text y="22" fill="rgba(255,255,255,.5)">▍ $204.8M annualized</text>
    <text y="42" fill="rgba(124,92,255,.7)">▍ 14 programs · 132 WBS</text>
  </g>

  <!-- Satellite glyph bottom-right -->
  <g transform="translate(1200 720)" opacity=".18" stroke="#38bdf8" stroke-width="2" fill="none">
    <rect x="30" y="30" width="40" height="40" rx="4"/>
    <line x1="50" y1="10" x2="50" y2="30"/>
    <circle cx="50" cy="6" r="4"/>
    <line x1="0" y1="40" x2="30" y2="45"/>
    <line x1="0" y1="60" x2="30" y2="55"/>
    <line x1="70" y1="45" x2="100" y2="40"/>
    <line x1="70" y1="55" x2="100" y2="60"/>
  </g>
</svg>
