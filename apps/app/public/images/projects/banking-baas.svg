<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" role="img" aria-label="Banking-as-a-Service abstract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset=".6" stop-color="#0a0d20"/>
      <stop offset="1" stop-color="#1a1d3a"/>
    </linearGradient>
    <linearGradient id="pillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".9"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity=".5"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 56V0h56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="875" fill="url(#bg)"/>
  <rect width="1400" height="875" fill="url(#grid)"/>
  <rect width="1400" height="875" fill="url(#glow)"/>

  <!-- Five transaction pillars -->
  <g transform="translate(360 200)">
    <rect x="0"   y="160" width="80" height="340" rx="8" fill="url(#pillar)" opacity=".65"/>
    <rect x="140" y=" 80" width="80" height="420" rx="8" fill="url(#pillar)" opacity=".85"/>
    <rect x="280" y="220" width="80" height="280" rx="8" fill="url(#pillar)" opacity=".55"/>
    <rect x="420" y="  0" width="80" height="500" rx="8" fill="url(#pillar)"/>
    <rect x="560" y="140" width="80" height="360" rx="8" fill="url(#pillar)" opacity=".7"/>
  </g>

  <!-- Connector flow -->
  <path d="M200 730 C 420 680, 700 780, 980 700 S 1300 640, 1300 640"
        fill="none" stroke="rgba(56,189,248,.55)" stroke-width="2"/>
  <path d="M200 760 C 500 820, 800 680, 1100 760 S 1300 720, 1300 720"
        fill="none" stroke="rgba(124,92,255,.5)" stroke-width="2" stroke-dasharray="6 8"/>

  <!-- Ledger dots -->
  <g fill="#38bdf8">
    <circle cx="200" cy="730" r="5"/>
    <circle cx="980" cy="700" r="5"/>
    <circle cx="1300" cy="640" r="5"/>
  </g>

  <!-- Vault glyph (bottom-right) -->
  <g transform="translate(1180 690)" opacity=".18" stroke="#38bdf8" stroke-width="2" fill="none">
    <rect x="0" y="0" width="150" height="120" rx="12"/>
    <circle cx="75" cy="60" r="38"/>
    <circle cx="75" cy="60" r="18"/>
    <line x1="75" y1="10" x2="75" y2="110"/>
    <line x1="25" y1="60" x2="125" y2="60"/>
  </g>
</svg>
