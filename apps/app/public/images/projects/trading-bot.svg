<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" role="img" aria-label="Crypto trading bot abstract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset=".6" stop-color="#0a0d20"/>
      <stop offset="1" stop-color="#1a1d3a"/>
    </linearGradient>
    <linearGradient id="up" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".2"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 56V0h56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="875" fill="url(#bg)"/>
  <rect width="1400" height="875" fill="url(#grid)"/>
  <rect width="1400" height="875" fill="url(#glow)"/>

  <!-- Horizontal guide lines -->
  <g stroke="rgba(255,255,255,.08)" stroke-dasharray="2 8">
    <line x1="140" y1="200" x2="1260" y2="200"/>
    <line x1="140" y1="340" x2="1260" y2="340"/>
    <line x1="140" y1="480" x2="1260" y2="480"/>
    <line x1="140" y1="620" x2="1260" y2="620"/>
  </g>

  <!-- Candlesticks (alternating up/down) -->
  <g stroke-width="2">
    <!-- 1 up -->
    <line x1="200" y1="280" x2="200" y2="560" stroke="url(#up)"/>
    <rect x="186" y="360" width="28" height="140" fill="url(#up)"/>
    <!-- 2 up -->
    <line x1="270" y1="220" x2="270" y2="520" stroke="url(#up)"/>
    <rect x="256" y="310" width="28" height="160" fill="url(#up)"/>
    <!-- 3 down -->
    <line x1="340" y1="260" x2="340" y2="580" stroke="url(#down)"/>
    <rect x="326" y="340" width="28" height="170" fill="url(#down)"/>
    <!-- 4 up -->
    <line x1="410" y1="180" x2="410" y2="500" stroke="url(#up)"/>
    <rect x="396" y="250" width="28" height="190" fill="url(#up)"/>
    <!-- 5 down -->
    <line x1="480" y1="160" x2="480" y2="540" stroke="url(#down)"/>
    <rect x="466" y="240" width="28" height="220" fill="url(#down)"/>
    <!-- 6 up -->
    <line x1="550" y1="140" x2="550" y2="460" stroke="url(#up)"/>
    <rect x="536" y="200" width="28" height="200" fill="url(#up)"/>
    <!-- 7 up -->
    <line x1="620" y1="120" x2="620" y2="420" stroke="url(#up)"/>
    <rect x="606" y="180" width="28" height="200" fill="url(#up)"/>
    <!-- 8 down -->
    <line x1="690" y1="200" x2="690" y2="500" stroke="url(#down)"/>
    <rect x="676" y="280" width="28" height="180" fill="url(#down)"/>
    <!-- 9 up -->
    <line x1="760" y1="150" x2="760" y2="440" stroke="url(#up)"/>
    <rect x="746" y="220" width="28" height="180" fill="url(#up)"/>
    <!-- 10 up -->
    <line x1="830" y1="100" x2="830" y2="400" stroke="url(#up)"/>
    <rect x="816" y="160" width="28" height="200" fill="url(#up)"/>
    <!-- 11 down -->
    <line x1="900" y1="120" x2="900" y2="460" stroke="url(#down)"/>
    <rect x="886" y="220" width="28" height="200" fill="url(#down)"/>
    <!-- 12 up -->
    <line x1="970" y1="90"  x2="970" y2="420" stroke="url(#up)"/>
    <rect x="956" y="160" width="28" height="220" fill="url(#up)"/>
    <!-- 13 up -->
    <line x1="1040" y1="70" x2="1040" y2="380" stroke="url(#up)"/>
    <rect x="1026" y="120" width="28" height="230" fill="url(#up)"/>
    <!-- 14 down -->
    <line x1="1110" y1="90" x2="1110" y2="420" stroke="url(#down)"/>
    <rect x="1096" y="170" width="28" height="210" fill="url(#down)"/>
    <!-- 15 up -->
    <line x1="1180" y1="60" x2="1180" y2="360" stroke="url(#up)"/>
    <rect x="1166" y="100" width="28" height="240" fill="url(#up)"/>
  </g>

  <!-- Trend line -->
  <path d="M186 430 L 256 390 L 326 420 L 396 340 L 466 340 L 536 300 L 606 280 L 676 360 L 746 310 L 816 260 L 886 320 L 956 260 L 1026 220 L 1096 280 L 1166 200"
        fill="none" stroke="rgba(56,189,248,.9)" stroke-width="2" stroke-linejoin="round"/>

  <!-- Bot glyph bottom-right -->
  <g transform="translate(1190 720)" opacity=".18" stroke="#38bdf8" stroke-width="2" fill="none">
    <rect x="20" y="0" width="70" height="60" rx="12"/>
    <circle cx="40" cy="25" r="5"/><circle cx="70" cy="25" r="5"/>
    <line x1="35" y1="45" x2="75" y2="45"/>
    <line x1="55" y1="-12" x2="55" y2="0"/>
    <circle cx="55" cy="-16" r="4"/>
    <line x1="10" y1="30" x2="20" y2="30"/>
    <line x1="90" y1="30" x2="100" y2="30"/>
  </g>
</svg>
