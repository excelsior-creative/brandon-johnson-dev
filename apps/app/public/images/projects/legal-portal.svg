<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" role="img" aria-label="Legal review portal abstract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset=".6" stop-color="#0a0d20"/>
      <stop offset="1" stop-color="#1a1d3a"/>
    </linearGradient>
    <linearGradient id="doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(56,189,248,.16)"/>
      <stop offset="1" stop-color="rgba(124,92,255,.08)"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 56V0h56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="875" fill="url(#bg)"/>
  <rect width="1400" height="875" fill="url(#grid)"/>
  <rect width="1400" height="875" fill="url(#glow)"/>

  <!-- Stack of three documents, slightly rotated -->
  <g transform="translate(700 437)">
    <g transform="rotate(-8) translate(-240 -280)">
      <rect x="0" y="0" width="480" height="560" rx="10" fill="url(#doc)" stroke="rgba(255,255,255,.12)"/>
    </g>
    <g transform="rotate(-2) translate(-240 -280)">
      <rect x="0" y="0" width="480" height="560" rx="10" fill="url(#doc)" stroke="rgba(255,255,255,.16)"/>
    </g>
    <g transform="translate(-240 -280)">
      <rect x="0" y="0" width="480" height="560" rx="10" fill="rgba(10,13,32,.85)" stroke="rgba(56,189,248,.35)"/>
      <!-- Document header bar -->
      <rect x="40" y="40" width="120" height="10" rx="3" fill="rgba(56,189,248,.6)"/>
      <rect x="40" y="60" width="220" height="6" rx="2" fill="rgba(255,255,255,.3)"/>
      <!-- Text lines -->
      <g fill="rgba(255,255,255,.22)">
        <rect x="40" y="110" width="400" height="8" rx="2"/>
        <rect x="40" y="130" width="380" height="8" rx="2"/>
        <rect x="40" y="150" width="340" height="8" rx="2"/>
        <rect x="40" y="170" width="400" height="8" rx="2"/>
        <rect x="40" y="190" width="300" height="8" rx="2"/>
      </g>
      <g fill="rgba(255,255,255,.18)">
        <rect x="40" y="230" width="400" height="6" rx="2"/>
        <rect x="40" y="245" width="360" height="6" rx="2"/>
        <rect x="40" y="260" width="400" height="6" rx="2"/>
        <rect x="40" y="275" width="320" height="6" rx="2"/>
        <rect x="40" y="290" width="400" height="6" rx="2"/>
        <rect x="40" y="305" width="380" height="6" rx="2"/>
      </g>
      <!-- Highlighted review marks -->
      <rect x="40" y="345" width="400" height="22" rx="4" fill="rgba(56,189,248,.12)" stroke="rgba(56,189,248,.4)"/>
      <rect x="40" y="390" width="300" height="22" rx="4" fill="rgba(124,92,255,.1)" stroke="rgba(124,92,255,.4)"/>
      <!-- Signature line -->
      <line x1="40" y1="490" x2="260" y2="490" stroke="rgba(255,255,255,.25)"/>
      <path d="M50 488 C 80 470, 120 510, 160 485 S 240 492, 250 488" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <!-- Stamp circle -->
      <g transform="translate(360 460)">
        <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(124,92,255,.55)" stroke-width="2"/>
        <circle cx="50" cy="50" r="36" fill="none" stroke="rgba(124,92,255,.35)" stroke-width="1" stroke-dasharray="3 3"/>
        <path d="M30 50 L44 64 L72 36" fill="none" stroke="#7c5cff" stroke-width="3" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <!-- Gavel glyph bottom-right -->
  <g transform="translate(1200 720)" opacity=".16" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round">
    <rect x="0" y="20" width="60" height="24" rx="4" transform="rotate(-30 30 32)"/>
    <line x1="35" y1="50" x2="85" y2="100"/>
    <line x1="5" y1="100" x2="90" y2="100"/>
  </g>
</svg>
