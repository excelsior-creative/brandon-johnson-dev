<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" role="img" aria-label="Shopify SaaS analytics abstract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset=".6" stop-color="#0a0d20"/>
      <stop offset="1" stop-color="#1a1d3a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".2"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="60%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".2"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 56V0h56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="875" fill="url(#bg)"/>
  <rect width="1400" height="875" fill="url(#grid)"/>
  <rect width="1400" height="875" fill="url(#glow)"/>

  <!-- "Dashboard" window chrome -->
  <g>
    <rect x="140" y="130" width="1120" height="620" rx="18" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.1)"/>
    <line x1="140" y1="180" x2="1260" y2="180" stroke="rgba(255,255,255,.08)"/>
    <circle cx="170" cy="155" r="6" fill="rgba(255,255,255,.18)"/>
    <circle cx="190" cy="155" r="6" fill="rgba(255,255,255,.12)"/>
    <circle cx="210" cy="155" r="6" fill="rgba(255,255,255,.1)"/>
  </g>

  <!-- KPI cards row -->
  <g>
    <rect x="180" y="220" width="240" height="100" rx="10" fill="rgba(56,189,248,.06)" stroke="rgba(56,189,248,.2)"/>
    <rect x="195" y="240" width="80" height="10" rx="3" fill="rgba(56,189,248,.5)"/>
    <rect x="195" y="265" width="120" height="18" rx="3" fill="rgba(255,255,255,.6)"/>
    <rect x="195" y="295" width="60" height="6" rx="2" fill="rgba(124,92,255,.5)"/>

    <rect x="450" y="220" width="240" height="100" rx="10" fill="rgba(124,92,255,.06)" stroke="rgba(124,92,255,.25)"/>
    <rect x="465" y="240" width="80" height="10" rx="3" fill="rgba(124,92,255,.6)"/>
    <rect x="465" y="265" width="140" height="18" rx="3" fill="rgba(255,255,255,.6)"/>
    <rect x="465" y="295" width="80" height="6" rx="2" fill="rgba(56,189,248,.5)"/>

    <rect x="720" y="220" width="240" height="100" rx="10" fill="rgba(56,189,248,.06)" stroke="rgba(56,189,248,.2)"/>
    <rect x="735" y="240" width="80" height="10" rx="3" fill="rgba(56,189,248,.5)"/>
    <rect x="735" y="265" width="100" height="18" rx="3" fill="rgba(255,255,255,.6)"/>
    <rect x="735" y="295" width="100" height="6" rx="2" fill="rgba(124,92,255,.5)"/>

    <rect x="990" y="220" width="230" height="100" rx="10" fill="rgba(124,92,255,.06)" stroke="rgba(124,92,255,.25)"/>
    <rect x="1005" y="240" width="80" height="10" rx="3" fill="rgba(124,92,255,.6)"/>
    <rect x="1005" y="265" width="130" height="18" rx="3" fill="rgba(255,255,255,.6)"/>
    <rect x="1005" y="295" width="70" height="6" rx="2" fill="rgba(56,189,248,.5)"/>
  </g>

  <!-- Bar chart (left) -->
  <g transform="translate(180 380)">
    <rect x="0"   y="200" width="40" height="120" rx="4" fill="url(#bar)" opacity=".65"/>
    <rect x="60"  y="140" width="40" height="180" rx="4" fill="url(#bar)" opacity=".85"/>
    <rect x="120" y="180" width="40" height="140" rx="4" fill="url(#bar)" opacity=".7"/>
    <rect x="180" y=" 80" width="40" height="240" rx="4" fill="url(#bar)"/>
    <rect x="240" y="120" width="40" height="200" rx="4" fill="url(#bar)" opacity=".8"/>
    <rect x="300" y=" 40" width="40" height="280" rx="4" fill="url(#bar)"/>
    <rect x="360" y=" 60" width="40" height="260" rx="4" fill="url(#bar)"/>
  </g>

  <!-- Area chart (right) -->
  <g transform="translate(720 380)">
    <path d="M0 260 L 60 200 L 120 220 L 180 140 L 240 160 L 300 100 L 360 120 L 420 70 L 480 110 L 500 110 L 500 320 L 0 320 Z"
          fill="url(#area)"/>
    <path d="M0 260 L 60 200 L 120 220 L 180 140 L 240 160 L 300 100 L 360 120 L 420 70 L 480 110"
          fill="none" stroke="#38bdf8" stroke-width="2.5"/>
    <g fill="#38bdf8">
      <circle cx="0" cy="260" r="4"/><circle cx="60" cy="200" r="4"/>
      <circle cx="120" cy="220" r="4"/><circle cx="180" cy="140" r="4"/>
      <circle cx="240" cy="160" r="4"/><circle cx="300" cy="100" r="4"/>
      <circle cx="360" cy="120" r="4"/><circle cx="420" cy=" 70" r="4"/>
      <circle cx="480" cy="110" r="4"/>
    </g>
  </g>

  <!-- Shopping-bag glyph bottom-right -->
  <g transform="translate(1180 690)" opacity=".14" stroke="#38bdf8" stroke-width="2.5" fill="none">
    <path d="M10 30 L 30 30 L 35 10 L 65 10 L 70 30 L 90 30 L 95 110 L 5 110 Z"/>
    <path d="M35 40 C 35 60, 65 60, 65 40"/>
  </g>
</svg>
