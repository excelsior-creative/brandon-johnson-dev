<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 875" role="img" aria-label="Web3 DeFi network abstract">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060f"/>
      <stop offset=".6" stop-color="#0a0d20"/>
      <stop offset="1" stop-color="#1a1d3a"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".25"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M0 56V0h56" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1400" height="875" fill="url(#bg)"/>
  <rect width="1400" height="875" fill="url(#grid)"/>
  <rect width="1400" height="875" fill="url(#glow)"/>

  <!-- Hex network: central + 6 around + outer 12 -->
  <g fill="none" stroke-width="2">
    <!-- Connector lines -->
    <g stroke="rgba(56,189,248,.45)">
      <line x1="700" y1="437" x2="840" y2="355"/>
      <line x1="700" y1="437" x2="840" y2="519"/>
      <line x1="700" y1="437" x2="560" y2="355"/>
      <line x1="700" y1="437" x2="560" y2="519"/>
      <line x1="700" y1="437" x2="700" y2="275"/>
      <line x1="700" y1="437" x2="700" y2="599"/>
      <line x1="840" y1="355" x2="980" y2="275"/>
      <line x1="560" y1="519" x2="420" y2="599"/>
      <line x1="700" y1="275" x2="840" y2="195"/>
      <line x1="700" y1="599" x2="560" y2="679"/>
      <line x1="840" y1="519" x2="980" y2="599"/>
      <line x1="560" y1="355" x2="420" y2="275"/>
    </g>

    <!-- Nodes: hex outlines -->
    <g stroke="url(#hex)">
      <!-- Center -->
      <polygon points="700,395 744,420 744,470 700,495 656,470 656,420" stroke-width="3" fill="rgba(56,189,248,.08)"/>
      <!-- Inner ring -->
      <polygon points="840,313 878,335 878,377 840,399 802,377 802,335" fill="rgba(124,92,255,.08)"/>
      <polygon points="840,477 878,499 878,541 840,563 802,541 802,499" fill="rgba(56,189,248,.08)"/>
      <polygon points="560,313 598,335 598,377 560,399 522,377 522,335" fill="rgba(56,189,248,.08)"/>
      <polygon points="560,477 598,499 598,541 560,563 522,541 522,499" fill="rgba(124,92,255,.08)"/>
      <polygon points="700,233 738,255 738,297 700,319 662,297 662,255" fill="rgba(56,189,248,.08)"/>
      <polygon points="700,557 738,579 738,621 700,643 662,621 662,579" fill="rgba(124,92,255,.08)"/>
      <!-- Outer -->
      <polygon points="980,233 1012,252 1012,290 980,309 948,290 948,252" opacity=".7"/>
      <polygon points="420,557 452,576 452,614 420,633 388,614 388,576" opacity=".7"/>
      <polygon points="840,153 872,172 872,210 840,229 808,210 808,172" opacity=".6"/>
      <polygon points="560,637 592,656 592,694 560,713 528,694 528,656" opacity=".6"/>
      <polygon points="980,557 1012,576 1012,614 980,633 948,614 948,576" opacity=".6"/>
      <polygon points="420,233 452,252 452,290 420,309 388,290 388,252" opacity=".6"/>
    </g>
  </g>

  <!-- Center token dot -->
  <circle cx="700" cy="445" r="8" fill="#38bdf8"/>
  <circle cx="700" cy="445" r="18" fill="none" stroke="rgba(56,189,248,.6)" stroke-width="1.5"/>

  <!-- Chain-link glyph bottom-right -->
  <g transform="translate(1200 720)" opacity=".16" stroke="#38bdf8" stroke-width="3" fill="none">
    <rect x="0" y="15" width="55" height="40" rx="20"/>
    <rect x="40" y="15" width="55" height="40" rx="20"/>
  </g>
</svg>
